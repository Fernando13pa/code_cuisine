<section class="loading" aria-labelledby="loading-title" aria-live="polite">
  <div class="page-container loading__inner">
    @if (recipeService.error()) {
      <div class="loading__error">
        <h1 id="loading-title">We couldn't generate your recipes</h1>
        <p>{{ recipeService.error()?.message }}</p>
        <button class="app-button app-button--primary-cream" type="button" (click)="retry()">
          Try again
        </button>
      </div>
    } @else {
      <div class="loading__content">
        <div class="loading__visual-frame">
          <img
            class="loading__visual"
            src="/4be39aa692622a05b3efe4b4f37bd0f590d35cd5%20(1).gif"
            width="436"
            height="613"
            alt="A spoon mixing a fresh salad"
          />
        </div>

        <h1 id="loading-title">
          Generating
          <span class="loading__ellipsis" aria-hidden="true">
            <span>.</span><span>.</span><span>.</span>
          </span>
        </h1>
      </div>
    }
  </div>
</section>
